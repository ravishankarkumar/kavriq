name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Replace with your default branch name
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for 'lastUpdated' to work correctly

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # with:
          # node-version: 20 # Optional: defaults to 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4